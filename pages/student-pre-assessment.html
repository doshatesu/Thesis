<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pre-Assessment - ReadWise</title>
  <link rel="stylesheet" href="../stylesheets/shared.css?v=20260316b">
</head>
<body>
<div class="demo-banner">ReadWise System | Pulo National High School</div>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">RW</div><h2>ReadWise</h2><p>Student Portal</p>
    </div>
    <nav>
      <a href="student-profile.html"><span class="icon" data-icon="profile"></span><span class="nav-label">My Profile</span></a>
      <a href="student-dashboard.html"><span class="icon" data-icon="dashboard"></span><span class="nav-label">Dashboard</span></a>
      <a href="student-passage.html"><span class="icon" data-icon="passage"></span><span class="nav-label">My Passage</span></a>
      <a href="student-progress.html"><span class="icon" data-icon="progress"></span><span class="nav-label">My Progress</span></a>
      <a href="student-pre-assessment.html" class="active"><span class="icon" data-icon="assessment"></span><span class="nav-label">Pre-Assessment</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info"><strong id="sb-name">-</strong>Grade 7</div>
      <button class="logout-btn" onclick="sessionStorage.clear();window.location.href='../login.html'"><span class="icon" data-icon="logout"></span><span class="nav-label">Logout</span></button>
    </div>
  </aside>
  <main class="main">
    <div style="max-width:700px;margin:0 auto">
      <div class="page-header">
        <h1>Pre-Assessment Test</h1>
        <p>Read 3 passages (Easy, Moderate, Hard) and answer the questions to determine your initial reading level.</p>
      </div>
      <div id="step-indicator" style="display:flex;align-items:center;gap:8px;margin-bottom:20px"></div>
      <div id="assessment-body"></div>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>
<script src="../mockData.js?v=20260316b"></script>
<script>
  const s = getCurrentStudent();
  document.getElementById("sb-name").textContent = s.name;

  const pids = ["p1", "p2", "p3"];
  let step = 0;
  const scores = [];

  function renderStep() {
    // Step indicator
    const ind = document.getElementById("step-indicator");
    ind.innerHTML = "";
    pids.forEach((_, i) => {
      const bar = document.createElement("div");
      bar.style.cssText = "flex:1;height:6px;border-radius:3px;background:" +
        (i < step ? "var(--primary)" : i === step ? "var(--accent)" : "var(--border)");
      ind.appendChild(bar);
    });
    const lbl = document.createElement("span");
    lbl.style.cssText = "font-size:12px;color:var(--muted);margin-left:8px;white-space:nowrap";
    lbl.textContent = "Step " + (step + 1) + " of 3";
    ind.appendChild(lbl);

    if (step >= pids.length) { showFinalResult(); return; }

    const pid = pids[step];
    const p = getPassage(pid);
    const qs = MOCK.questions[pid];
    const stepLabels = ["Step 1 - Easy Passage", "Step 2 - Moderate Passage", "Step 3 - Hard Passage"];

    const body = document.getElementById("assessment-body");
    body.innerHTML = "";

    // Passage card
    const passageCard = document.createElement("div");
    passageCard.className = "card";
    passageCard.style.marginBottom = "14px";

    const badgeCls = badgeClass(p.label);
    let passageHTML = '<div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px">' + stepLabels[step] + '</div>';
    passageHTML += '<div style="margin-bottom:8px">';
    passageHTML += '<span class="badge ' + badgeCls + '">' + p.label + '</span>';
    passageHTML += '<span class="badge badge-primary" style="margin-left:6px">' + p.genre + '</span>';
    passageHTML += '</div>';
    passageHTML += '<h3 style="font-size:17px;font-weight:700;color:var(--secondary);margin-bottom:10px">' + p.title + '</h3>';
    passageHTML += '<div class="reading-area" style="font-size:14px;line-height:1.8;background:#f7fafc;padding:16px;border-radius:8px">';
    p.text.split('\n').forEach(function(t) {
      if (t.trim()) passageHTML += '<p style="margin-bottom:1em">' + t.trim() + '</p>';
    });
    passageHTML += '</div>';
    passageCard.innerHTML = passageHTML;
    body.appendChild(passageCard);

    // Questions card
    const qCard = document.createElement("div");
    qCard.className = "card";

    const titleDiv = document.createElement("div");
    titleDiv.className = "section-title";
    titleDiv.textContent = "Comprehension Questions";
    qCard.appendChild(titleDiv);

    qs.forEach(function(q, i) {
      const qWrap = document.createElement("div");
      qWrap.style.marginBottom = "18px";

      const qText = document.createElement("div");
      qText.style.cssText = "font-weight:700;margin-bottom:10px;color:var(--secondary)";
      qText.textContent = "Q" + (i + 1) + ". " + q.q;
      qWrap.appendChild(qText);

      const optWrap = document.createElement("div");
      optWrap.style.cssText = "display:flex;flex-direction:column;gap:8px";

      q.opts.forEach(function(opt, j) {
        const lbl = document.createElement("label");
        lbl.style.cssText = "display:flex;align-items:center;gap:10px;cursor:pointer;" +
          "padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;" +
          "font-size:14px;transition:.2s;";

        lbl.onmouseover = function() { this.style.borderColor = "var(--primary)"; };
        lbl.onmouseout  = function() { this.style.borderColor = "var(--border)"; };

        const radio = document.createElement("input");
        radio.type  = "radio";
        radio.name  = "pa_q" + i;
        radio.value = j;
        radio.style.accentColor = "var(--primary)";

        const span = document.createElement("span");
        span.textContent = String.fromCharCode(65 + j) + ". " + opt;

        lbl.appendChild(radio);
        lbl.appendChild(span);
        optWrap.appendChild(lbl);
      });

      qWrap.appendChild(optWrap);
      qCard.appendChild(qWrap);
    });

    // Next button
    const btnWrap = document.createElement("div");
    btnWrap.style.cssText = "text-align:right;margin-top:14px";
    const btn = document.createElement("button");
    btn.className = "btn btn-primary";
    btn.textContent = step < pids.length - 1 ? "Next Passage" : "Submit Assessment";
    btn.onclick = nextStep;
    btnWrap.appendChild(btn);
    qCard.appendChild(btnWrap);

    body.appendChild(qCard);
  }

  function nextStep() {
    const pid = pids[step];
    const qs = MOCK.questions[pid];
    let correct = 0;
    qs.forEach(function(q, i) {
      const sel = document.querySelector('input[name="pa_q' + i + '"]:checked');
      if (sel && parseInt(sel.value) === q.ans) correct++;
    });
    scores.push({ pid: pid, correct: correct, total: qs.length, pct: Math.round(correct / qs.length * 100) });
    step++;
    renderStep();
  }

  function showFinalResult() {
    const total   = scores.reduce(function(a, b) { return a + b.correct; }, 0);
    const totalQ  = scores.reduce(function(a, b) { return a + b.total; }, 0);
    const overall = Math.round(total / totalQ * 100);
    const level   = overall >= 70 ? "HARD" : overall >= 55 ? "MODERATE" : "EASY";
    const badgeCls = badgeClass(level);

    const body = document.getElementById("assessment-body");
    body.innerHTML = "";

    const card = document.createElement("div");
    card.className = "card";
    card.style.cssText = "text-align:center;padding:40px";

    card.innerHTML =
      '<div style="font-size:48px;font-weight:900;color:var(--secondary)">' + overall + '%</div>' +
      '<div style="font-size:16px;margin:8px 0;color:var(--muted)">' + total + ' of ' + totalQ + ' correct</div>' +
      '<div style="margin:16px 0">' +
        '<span class="badge ' + badgeCls + '" style="font-size:16px;padding:8px 20px">Recommended Level: ' + level + '</span>' +
      '</div>' +
      '<p style="font-size:14px;color:var(--muted);max-width:400px;margin:0 auto 20px">' +
        'Based on your pre-assessment results, ReadWise recommends placing you in the <strong>' + level + '</strong> reading class. Your teacher will confirm this assignment.' +
      '</p>' +
      '<div style="display:flex;gap:10px;justify-content:center">' +
        '<a href="student-dashboard.html" class="btn btn-primary">Go to Dashboard</a>' +
        '<a href="student-progress.html" class="btn btn-outline">View Progress</a>' +
      '</div>';

    body.appendChild(card);

    const ind = document.getElementById("step-indicator");
    ind.innerHTML = "";
    const done = document.createElement("span");
    done.className = "badge badge-success";
    done.style.cssText = "font-size:14px;padding:6px 16px";
    done.textContent = "Pre-Assessment Complete";
    ind.appendChild(done);
  }

  renderStep();
</script>
</body>
</html>
