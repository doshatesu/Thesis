<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading - ReadWise</title>
  <link rel="stylesheet" href="../stylesheets/shared.css?v=20260316b">
</head>
<body>
<div class="demo-banner">ReadWise System | Pulo National High School</div>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">RW</div><h2>ReadWise</h2><p>Student Portal</p>
    </div>
    <nav>
      <a href="student-profile.html"><span class="icon" data-icon="profile"></span><span class="nav-label">My Profile</span></a>
      <a href="student-dashboard.html"><span class="icon" data-icon="dashboard"></span><span class="nav-label">Dashboard</span></a>
      <a href="student-passage.html" class="active"><span class="icon" data-icon="passage"></span><span class="nav-label">My Passage</span></a>
      <a href="student-progress.html"><span class="icon" data-icon="progress"></span><span class="nav-label">My Progress</span></a>
      <a href="student-pre-assessment.html"><span class="icon" data-icon="assessment"></span><span class="nav-label">Pre-Assessment</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info"><strong id="sb-name">-</strong>Grade 7</div>
      <button class="logout-btn" onclick="logout()"><span class="icon" data-icon="logout"></span><span class="nav-label">Logout</span></button>
    </div>
  </aside>
  <main class="main">
    <div class="reading-shell">
      <button class="back-btn" onclick="history.back()"><span class="icon" data-icon="back"></span>Back</button>
      <div class="reading-toolbar">
        <div>
          <span class="reading-toolbar-label">Reading Time</span>
          <span class="reading-timer" id="timer">0:00</span>
        </div>
        <div id="timer-status" class="reading-status">Reading in progress...</div>
      </div>
      <div id="week-warning" class="surface-note surface-note-warn reading-warning" style="display:none"></div>
      <div class="card reading-card" id="passage-body">
        <div id="passage-meta" class="reading-card-header"></div>
        <div class="reading-area" id="passage-text"></div>
        <div class="reading-actions">
          <button class="btn btn-primary" id="next-btn" onclick="goToQuestions()">
            Done Reading - Answer Questions
          </button>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../api.js"></script>
<script src="../mockData.js?v=20260316b"></script>
<script>
  const params = new URLSearchParams(location.search);
  const pid = params.get("id") || "p3";
  const week = ReadWiseAPI.getActiveWeek();

  async function bootstrapPage() {
    let auth = null;
    let passage = null;
    let weeklyIds = [];

    try {
      auth = await ReadWiseAPI.me();
      if (!auth || !auth.user || auth.user.role !== "student" || !auth.user.student) {
        throw new Error("Unauthorized");
      }
      document.getElementById("sb-name").textContent = auth.user.student.name || "Student";
      passage = await ReadWiseAPI.getPassage(pid);
      const weekly = await ReadWiseAPI.getStudentWeeklyPassages(week);
      weeklyIds = ((weekly && weekly.passages) || []).map(function(entry) { return entry.id; });
    } catch (error) {
      window.location.href = "../login.html";
      return;
    }

    if (!passage) {
      document.getElementById("passage-body").innerHTML =
        '<div class="surface-note surface-note-danger">Passage not found.</div>';
      return;
    }

    if (!weeklyIds.includes(pid)) {
      const warning = document.getElementById("week-warning");
      warning.style.display = "block";
      warning.textContent = "This passage is outside your Week " + week + " assigned list.";
    }

    document.getElementById("passage-meta").innerHTML =
      '<div class="reading-meta">' +
      '<span class="badge ' + badgeClass(passage.label) + '">' + passage.label + '</span>' +
      '<span class="badge badge-primary">' + passage.genre + '</span>' +
      '<span class="meta-pill">Week ' + week + "</span>" +
      "</div>" +
      '<h2 class="reading-title">' + passage.title + "</h2>" +
      '<div class="card-meta-row">' +
        '<span class="library-card-fact">' + passage.words + " words</span>" +
        '<span class="library-card-fact">~' + passage.time + ' min reading time</span>' +
      "</div>";

    const paraText = passage.text.split("\n").map(function(para) {
      return para.trim() ? "<p>" + para.trim() + "</p>" : "";
    }).join("");
    document.getElementById("passage-text").innerHTML = paraText;
  }

  let secs = 0;
  let timerInterval = setInterval(tick, 1000);
  function tick() {
    secs++;
    const minutes = Math.floor(secs / 60);
    const seconds = secs % 60;
    document.getElementById("timer").textContent = minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
  }

  function goToQuestions() {
    clearInterval(timerInterval);
    const minutes = Math.floor(secs / 60);
    const seconds = secs % 60;
    const timeStr = minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
    document.getElementById("timer-status").textContent = "Reading Time: " + timeStr;
    document.getElementById("next-btn").disabled = true;
    document.getElementById("next-btn").textContent = "Proceeding...";
    sessionStorage.setItem("readingTime_" + pid, timeStr);
    setTimeout(function() {
      window.location.href = "student-questions.html?id=" + pid;
    }, 600);
  }

  async function logout() {
    try {
      await ReadWiseAPI.logout();
    } catch (error) {
      // ignore logout API errors
    }
    sessionStorage.clear();
    window.location.href = "../login.html";
  }

  bootstrapPage();
</script>
</body>
</html>
