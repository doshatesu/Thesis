<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Passages - ReadWise</title>
  <link rel="stylesheet" href="../stylesheets/shared.css?v=20260316b">
</head>
<body>
<div class="demo-banner">ReadWise System | Pulo National High School</div>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">RW</div><h2>ReadWise</h2><p>Student Portal</p>
    </div>
    <nav>
      <a href="student-profile.html"><span class="icon" data-icon="profile"></span><span class="nav-label">My Profile</span></a>
      <a href="student-dashboard.html"><span class="icon" data-icon="dashboard"></span><span class="nav-label">Dashboard</span></a>
      <a href="student-passage.html" class="active"><span class="icon" data-icon="passage"></span><span class="nav-label">My Passage</span></a>
      <a href="student-progress.html"><span class="icon" data-icon="progress"></span><span class="nav-label">My Progress</span></a>
      <a href="student-pre-assessment.html"><span class="icon" data-icon="assessment"></span><span class="nav-label">Pre-Assessment</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info"><strong id="sb-name">-</strong>Grade 7</div>
      <button class="logout-btn" onclick="logout()"><span class="icon" data-icon="logout"></span><span class="nav-label">Logout</span></button>
    </div>
  </aside>
  <main class="main">
    <div class="page-header">
      <p class="eyebrow">Weekly reading queue</p>
      <h1>My Weekly Passages</h1>
      <p id="week-subtitle">Weekly class-based reading assignments</p>
    </div>
    <div class="card" id="passage-detail"></div>
  </main>
</div>
<script src="../api.js"></script>
<script src="../mockData.js?v=20260316b"></script>
<script>
  async function bootstrapPage() {
    const container = document.getElementById("passage-detail");
    let auth = null;
    try {
      auth = await ReadWiseAPI.me();
      if (!auth || !auth.user || auth.user.role !== "student" || !auth.user.student) {
        throw new Error("Unauthorized");
      }
    } catch (error) {
      window.location.href = "../login.html";
      return;
    }

    const student = auth.user.student;
    const week = ReadWiseAPI.getActiveWeek();

    let passages = [];
    let completedIds = [];
    try {
      const weekly = await ReadWiseAPI.getStudentWeeklyPassages(week);
      const completion = await ReadWiseAPI.getStudentCompletions(week);
      passages = (weekly && weekly.passages) || [];
      completedIds = (completion && completion.completedPassageIds) || [];
    } catch (error) {
      showToast(error.message || "Unable to load weekly passages.", "#c0392b");
      return;
    }

    document.getElementById("sb-name").textContent = student.name;
    document.getElementById("week-subtitle").textContent =
      "Week " + week + " assignments for " + getClassDisplayName(student.classLevel) + " class (" +
      passages.length + " passages)";

    if (!passages.length) {
      container.innerHTML =
        '<div class="surface-note surface-note-warn">' +
        "<strong>No passages assigned yet.</strong><br>" +
        "Your teacher has not assigned this week's set of passages for your class." +
        "</div>";
      return;
    }

    const pending = passages.filter(function(passage) { return !completedIds.includes(passage.id); });
    const nextPassage = pending[0] || passages[0];
    container.innerHTML =
      '<div class="passage-highlight" style="margin-bottom:14px">' +
      '<strong>Next passage to complete:</strong> ' + nextPassage.title +
      "</div>" +
      '<div class="passage-list">' +
      passages.map(function(passage, index) {
        const done = completedIds.includes(passage.id);
        const status = done
          ? '<span class="badge badge-easy">Completed</span>'
          : '<span class="badge badge-moderate">Pending</span>';
        const buttonStyle = done ? "btn-outline" : "btn-primary";
        const buttonText = done ? "Review Passage" : "Start Reading";
        const preview = passage.text.split("\n")[0].slice(0, 260).trim() + "...";
        return (
          '<div class="passage-list-card">' +
            '<div class="passage-list-header">' +
              '<div>' +
                '<div class="pill-row" style="margin-bottom:6px">' +
                  '<span class="badge ' + badgeClass(passage.label) + '">' + getClassDisplayName(passage.label) + '</span>' +
                  '<span class="badge badge-primary">' + passage.genre + '</span>' +
                  '<span class="meta-pill">Passage ' + (index + 1) + " of " + passages.length + "</span>" +
                "</div>" +
                '<h3 class="passage-list-title">' + passage.title + "</h3>" +
                '<div class="card-meta-row">' +
                  '<span class="library-card-fact">' + passage.words + " words</span>" +
                  '<span class="library-card-fact">~' + passage.time + ' min</span>' +
                '</div>' +
              "</div>" +
              status +
            "</div>" +
            '<p class="passage-list-preview">' + preview + "</p>" +
            '<a href="student-reading.html?id=' + passage.id + '" class="btn ' + buttonStyle + '">' + buttonText + "</a>" +
          "</div>"
        );
      }).join("") +
      "</div>";
  }

  async function logout() {
    try {
      await ReadWiseAPI.logout();
    } catch (error) {
      // ignore logout API errors
    }
    sessionStorage.clear();
    window.location.href = "../login.html";
  }

  bootstrapPage();
</script>
</body>
</html>
